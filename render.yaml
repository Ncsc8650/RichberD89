services:
  - type: web
    name: richberd89
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -c "import pathlib, shutil, site; pathlib.Path('Fonts').mkdir(exist_ok=True); fonts=[x for p in site.getsitepackages() for x in pathlib.Path(p).rglob('NotoSansThai-Regular.ttf')]; shutil.copy(fonts[0], 'Fonts/tahoma.ttf')" && WINDIR=. python -c "import os, app; app.init_db(); app.ThreadingHTTPServer(('0.0.0.0', int(os.environ.get('PORT','8000'))), app.App).serve_forever()"
    envVars:
      - key: HOST
        value: 0.0.0.0
